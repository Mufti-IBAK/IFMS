name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Test & Lint Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Run Tests
      run: |
        pip install -r requirements.txt pytest
        python -m pytest tests/

  # Job 2: Build Backend Docker Image (no AWS validation)
  backend-deploy:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t ifms-backend:${{ github.sha }} .
          docker tag ifms-backend:${{ github.sha }} ifms-backend:latest

      - name: Save Docker image to tar
        run: |
          docker save ifms-backend:${{ github.sha }} -o ifms-backend_${{ github.sha }}.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: ifms-backend_${{ github.sha }}.tar

  # Job 3: Build & Release Flutter Android APK / App Bundle
  mobile-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set Build Number
      run: |
        echo "BUILD_NUMBER=$((10000 + ${{ github.run_number }}))" >> $GITHUB_ENV
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install dependencies
      run: |
        cd mobile
        flutter pub get
    - name: Build Android App Bundle (AAB)
      run: |
        cd mobile
        flutter build appbundle --release \
          --build-name=2.5.0 \
          --build-number=${{ env.BUILD_NUMBER }}
    - name: Build APK for OTA Updater
      run: |
        cd mobile
        flutter build apk --release \
          --build-name=2.5.0 \
          --build-number=${{ env.BUILD_NUMBER }}
    - name: Upload OTA APK
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        # 1. Upload APK to storage, with x-upsert: true to allow overwriting the existing file
        curl --fail-with-body -sS -X POST \
          -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
          -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
          -H "x-upsert: true" \
          -F "file=@mobile/build/app/outputs/flutter-apk/app-release.apk" \
          -F "cacheControl=3600" \
          "$SUPABASE_URL/storage/v1/object/updates/Namanzo_IFMS_latest.apk"
          
        # 2. Register update details in the database system_updates table
        curl --fail-with-body -sS -X POST \
          -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
          -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
          -H "Content-Type: application/json" \
          -d "{\"version_number\": \"2.5.0+${{ env.BUILD_NUMBER }}\", \"download_url\": \"$SUPABASE_URL/storage/v1/object/public/updates/Namanzo_IFMS_latest.apk\", \"release_notes\": \"NFarms Build #${{ env.BUILD_NUMBER }}: Integrated Settings screen, custom font scale slider (10% to 200%, default 50%), dark mode support, and profile demographics form.\"}" \
          "$SUPABASE_URL/rest/v1/system_updates"

