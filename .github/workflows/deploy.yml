name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Test & Lint Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Run Tests
      run: |
        pip install -r requirements.txt pytest
        pytest tests/

  # Job 2: Build & Push Backend Docker Image
  backend-deploy:
    needs: backend-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY || '123456789012.dkr.ecr.eu-west-1.amazonaws.com' }}
        ECR_REPOSITORY: ifms-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags
    - name: Deploy to Kubernetes
      run: |
        aws eks update-kubeconfig --name ifms-prod-cluster --region eu-west-1
        kubectl set image deployment/ifms-backend backend=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} -n ifms-prod
        kubectl rollout status deployment/ifms-backend -n ifms-prod

  # Job 3: Build & Release Flutter Android APK / App Bundle
  mobile-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install dependencies
      run: |
        cd mobile
        flutter pub get
    - name: Build Android App Bundle (AAB)
      run: |
        cd mobile
        flutter build appbundle --release \
          --build-name=2.5.0 \
          --build-number=${{ github.run_number }}
    - name: Build APK for OTA Updater
      run: |
        cd mobile
        flutter build apk --release \
          --build-name=2.5.0 \
          --build-number=${{ github.run_number }}
    - name: Upload OTA APK
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        # 1. Upload APK to storage (overwrite existing latest)
        curl -X POST \
          -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
          -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
          -F "file=@mobile/build/app/outputs/flutter-apk/app-release.apk" \
          -F "cacheControl=3600" \
          "$SUPABASE_URL/storage/v1/object/updates/Namanzo_IFMS_latest.apk" || true
          
        # 2. Register update details in the database system_updates table
        curl -X POST \
          -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
          -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
          -H "Content-Type: application/json" \
          -d "{\"version_number\": \"2.5.0+${{ github.run_number }}\", \"download_url\": \"$SUPABASE_URL/storage/v1/object/public/updates/Namanzo_IFMS_latest.apk\", \"release_notes\": \"NFarms Build #${{ github.run_number }}: Integrated Settings screen, custom font scale slider (10% to 200%, default 50%), dark mode support, and profile demographics form.\"}" \
          "$SUPABASE_URL/rest/v1/system_updates"

