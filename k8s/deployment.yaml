apiVersion: apps/v1
kind: Deployment
metadata:
  name: ifms-backend
  namespace: ifms-prod
  labels:
    app: ifms-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ifms-backend
  template:
    metadata:
      labels:
        app: ifms-backend
    spec:
      containers:
      - name: backend
        image: 123456789012.dkr.ecr.eu-west-1.amazonaws.com/ifms-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        envFrom:
        - secretRef:
            name: ifms-db-secrets
        - configMapRef:
            name: ifms-config
---
apiVersion: v1
kind: Service
metadata:
  name: ifms-backend-service
  namespace: ifms-prod
spec:
  type: ClusterIP
  selector:
    app: ifms-backend
  ports:
  - port: 80
    targetPort: 8000
