<body class="h-full bg-background text-on-background antialiased flex flex-col justify-center items-center p-margin_mobile md:p-margin_desktop relative overflow-hidden">
<!-- Organic Background Pattern Overlay -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background-image: radial-gradient(circle at 20% 30%, theme('colors.primary-container') 0%, transparent 20%), radial-gradient(circle at 80% 70%, theme('colors.secondary-container') 0%, transparent 20%); filter: blur(60px);"></div>
<!-- Main Auth Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-surface-variant z-10 flex flex-col overflow-hidden">
<!-- Header / Branding -->
<div class="p-stack_lg flex flex-col items-center bg-surface-container-lowest">
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center mb-stack_md shadow-sm">
<span class="material-symbols-outlined text-4xl" data-icon="precision_manufacturing">precision_manufacturing</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary text-center">IFMS</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-stack_sm">Farm Brain Core</p>
</div>
<!-- Form Area -->
<div class="px-stack_lg pb-stack_lg flex flex-col gap-stack_lg bg-surface-container-lowest">
<div class="flex flex-col gap-stack_md">
<label class="font-label-md text-label-md text-on-surface">Phone Number</label>
<div class="flex">
<button class="flex items-center gap-1 bg-surface-container-high px-3 py-3 rounded-l border border-outline-variant border-r-0 hover:bg-surface-variant transition-colors text-on-surface">
<span class="font-body-md text-body-md">+1</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_drop_down">arrow_drop_down</span>
</button>
<input class="flex-1 bg-surface-container-lowest border border-outline-variant rounded-r px-3 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-outline" placeholder="(555) 123-4567" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-stack_md">
<label class="font-label-md text-label-md text-on-surface">Password or PIN</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded px-3 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-outline" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary py-3 rounded font-title-md text-title-md hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-sm mt-stack_sm">
                Sign In
                <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</div>
<!-- Role Selection -->
<div class="bg-surface-container p-stack_lg border-t border-surface-variant">
<h2 class="font-label-md text-label-md text-on-surface-variant mb-stack_md">Select Profile Scope</h2>
<div class="flex gap-gutter overflow-x-auto snap-x snap-mandatory pb-stack_sm hide-scrollbar" style="scrollbar-width: none;">
<!-- Owner -->
<div class="snap-start shrink-0 w-32 bg-surface-container-lowest rounded-lg border border-primary p-stack_md flex flex-col items-center justify-center gap-stack_sm cursor-pointer shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="admin_panel_settings">admin_panel_settings</span>
<span class="font-label-md text-label-md text-primary font-bold">Owner</span>
</div>
<!-- Vet -->
<div class="snap-start shrink-0 w-32 bg-surface-container-highest rounded-lg border border-transparent p-stack_md flex flex-col items-center justify-center gap-stack_sm cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="vaccines">vaccines</span>
<span class="font-label-md text-label-md text-on-surface-variant">Veterinarian</span>
</div>
<!-- Manager -->
<div class="snap-start shrink-0 w-32 bg-surface-container-highest rounded-lg border border-transparent p-stack_md flex flex-col items-center justify-center gap-stack_sm cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="manage_accounts">manage_accounts</span>
<span class="font-label-md text-label-md text-on-surface-variant">Manager</span>
</div>
<!-- Worker -->
<div class="snap-start shrink-0 w-32 bg-surface-container-highest rounded-lg border border-transparent p-stack_md flex flex-col items-center justify-center gap-stack_sm cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="agriculture">agriculture</span>
<span class="font-label-md text-label-md text-on-surface-variant">Field Worker</span>
</div>
</div>
</div>
</main>
<!-- Offline Pill Indicator -->
<div class="absolute bottom-margin_mobile md:bottom-margin_desktop z-10 flex justify-center w-full max-w-md px-margin_mobile">
<div class="bg-surface-container-high rounded-full px-4 py-2 flex items-center gap-2 shadow-md border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="cloud_sync">cloud_sync</span>
<span class="font-label-md text-label-md text-on-surface-variant">Ready to work offline. Actions will queue automatically.</span>
</div>
</div>
</body></html>
